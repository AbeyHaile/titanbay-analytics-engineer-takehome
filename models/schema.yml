version: 2

models:
  - name: stg_freshdesk_tickets
    columns:
      - name: ticket_id
        tests:
          - not_null
          - unique

      - name: requester_email
        tests:
          - not_null

      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['open', 'pending', 'resolved', 'closed']

      - name: priority
        tests:
          - not_null
          - accepted_values:
              values: ['low', 'medium', 'high', 'urgent']

      - name: created_at
        tests:
          - not_null

  - name: stg_platform_partners
    columns:
      - name: partner_id
        tests:
          - not_null
          - unique

      - name: partner_type
        tests:
          - not_null
          - accepted_values:
              values: ['wealth_manager', 'fund_manager', 'family_office']

  - name: stg_platform_relationship_managers
    columns:
      - name: rm_id
        tests:
          - not_null
          - unique

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: email
        tests:
          - not_null

  - name: stg_platform_entities
    columns:
      - name: entity_id
        tests:
          - not_null
          - unique

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: entity_type
        tests:
          - not_null
          - accepted_values:
              values: ['individual', 'corporate', 'trust', 'pension_fund']

      - name: kyc_status
        tests:
          - not_null
          - accepted_values:
              values: ['approved', 'pending', 'expired', 'rejected']

  - name: stg_platform_investors
    columns:
      - name: investor_id
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null
          - unique

      - name: email
        tests:
          - not_null

      - name: entity_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_entities')
              field: entity_id

      - name: relationship_manager_id
        tests:
          - relationships:
              to: ref('stg_platform_relationship_managers')
              field: rm_id

  - name: stg_platform_fund_closes
    columns:
      - name: close_id
        tests:
          - not_null
          - unique

      - name: fund_id
        tests:
          - not_null

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: close_number
        tests:
          - not_null

      - name: scheduled_close_date
        tests:
          - not_null

      - name: close_status
        tests:
          - not_null
          - accepted_values:
              values: ['upcoming', 'completed', 'cancelled']

      - name: total_committed_aum
        tests:
          - not_null

  - name: int_ticket_requester_resolution
    description: Resolves Freshdesk ticket requesters to investors, relationship managers, or unknown users.
    columns:
      - name: ticket_id
        tests:
          - not_null
          - unique

      - name: requester_type
        tests:
          - not_null
          - accepted_values:
              values: ['investor', 'relationship_manager', 'unknown']

      - name: resolution_method
        tests:
          - not_null
          - accepted_values:
              values: ['investor_email', 'rm_email', 'unresolved']

      - name: resolved_partner_id
        tests:
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

  - name: fact_support_tickets
    description: Ticket-level fact table preserving one row per Freshdesk support ticket.
    columns:
      - name: ticket_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_freshdesk_tickets')
              field: ticket_id

      - name: requester_type
        tests:
          - not_null
          - accepted_values:
              values: ['investor', 'relationship_manager', 'unknown']

      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['open', 'pending', 'resolved', 'closed']

      - name: priority
        tests:
          - not_null
          - accepted_values:
              values: ['low', 'medium', 'high', 'urgent']

      - name: resolved_partner_id
        tests:
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: is_resolved
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: is_urgent
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

  - name: fact_investor_support_profile
    description: Investor-level support profile summarising direct investor-raised support activity.
    columns:
      - name: investor_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_platform_investors')
              field: investor_id

      - name: entity_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_entities')
              field: entity_id

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: total_tickets
        tests:
          - not_null

      - name: urgent_tickets
        tests:
          - not_null

      - name: support_tier
        tests:
          - not_null
          - accepted_values:
              values: ['high_touch', 'regular', 'low_touch', 'no_support_contact']

      - name: frustration_status
        tests:
          - not_null
          - accepted_values:
              values: ['active_risk', 'elevated', 'slow_resolution', 'stable']

      - name: engagement_status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'dormant', 'never_contacted']

  - name: fact_partner_close_pressure
    description: Partner-close level fact table measuring ticket pressure around fund close events.
    columns:
      - name: partner_close_support_pressure_sk
        tests:
          - not_null
          - unique

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: close_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_fund_closes')
              field: close_id

      - name: total_tickets_in_close_window
        tests:
          - not_null

      - name: urgent_tickets_in_close_window
        tests:
          - not_null

      - name: tickets_0_to_7_days_before_close
        tests:
          - not_null

      - name: tickets_8_to_14_days_before_close
        tests:
          - not_null

      - name: tickets_1_to_7_days_after_close
        tests:
          - not_null

      - name: is_high_aum_close
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: is_high_risk_high_value_close
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
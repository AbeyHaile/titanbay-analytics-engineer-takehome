version: 2

models:
  - name: stg_freshdesk_tickets
    columns:
      - name: ticket_id
        tests:
          - not_null
          - unique

      - name: requester_email
        tests:
          - not_null

      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['open', 'pending', 'resolved', 'closed']

      - name: priority
        tests:
          - not_null
          - accepted_values:
              values: ['low', 'medium', 'high', 'urgent']

      - name: created_at
        tests:
          - not_null

  - name: stg_platform_partners
    columns:
      - name: partner_id
        tests:
          - not_null
          - unique

      - name: partner_type
        tests:
          - not_null
          - accepted_values:
              values: ['wealth_manager', 'fund_manager', 'family_office']

  - name: stg_platform_relationship_managers
    columns:
      - name: rm_id
        tests:
          - not_null
          - unique

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: email
        tests:
          - not_null

  - name: stg_platform_entities
    columns:
      - name: entity_id
        tests:
          - not_null
          - unique

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: entity_type
        tests:
          - not_null
          - accepted_values:
              values: ['individual', 'corporate', 'trust', 'pension_fund']

      - name: kyc_status
        tests:
          - not_null
          - accepted_values:
              values: ['approved', 'pending', 'expired', 'rejected']

  - name: stg_platform_investors
    columns:
      - name: investor_id
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null
          - unique

      - name: email
        tests:
          - not_null

      - name: entity_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_entities')
              field: entity_id

      - name: relationship_manager_id
        tests:
          - relationships:
              to: ref('stg_platform_relationship_managers')
              field: rm_id

  - name: stg_platform_fund_closes
    columns:
      - name: close_id
        tests:
          - not_null
          - unique

      - name: fund_id
        tests:
          - not_null

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: close_number
        tests:
          - not_null

      - name: scheduled_close_date
        tests:
          - not_null

      - name: close_status
        tests:
          - not_null
          - accepted_values:
              values: ['upcoming', 'completed', 'cancelled']

      - name: total_committed_aum
        tests:
          - not_null

  - name: int_ticket_requester_resolution
    columns:
      - name: ticket_id
        tests:
          - not_null
          - unique

      - name: requester_type
        tests:
          - not_null
          - accepted_values:
              values: ['investor', 'relationship_manager', 'unknown']

      - name: resolution_method
        tests:
          - not_null
          - accepted_values:
              values: ['investor_email', 'rm_email', 'unresolved']

      - name: resolved_partner_id
        tests:
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

  - name: fact_support_tickets
    columns:
      - name: ticket_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_freshdesk_tickets')
              field: ticket_id

      - name: requester_type
        tests:
          - not_null
          - accepted_values:
              values: ['investor', 'relationship_manager', 'unknown']

      - name: resolved_partner_id
        tests:
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

  - name: fact_partner_close_pressure_investor_support_profile
    columns:
      - name: investor_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_platform_investors')
              field: investor_id

      - name: entity_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_entities')
              field: entity_id

      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: total_tickets
        tests:
          - not_null

  - name: fact_partner_close_pressure
    columns:
      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: close_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_platform_fund_closes')
              field: close_id

      - name: tickets_0_to_7_days_before_close
        tests:
          - not_null

      - name: tickets_8_to_14_days_before_close
        tests:
          - not_null

      - name: tickets_1_to_7_days_after_close
        tests:
          - not_null

      - name: urgent_14d_before
        tests:
          - not_null
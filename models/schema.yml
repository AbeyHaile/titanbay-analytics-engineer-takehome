version: 2

models:
  - name: stg_freshdesk_tickets
    description: Cleaned Freshdesk support ticket source, preserving one row per support ticket raised by investors, relationship managers, or unknown requesters.
    columns:
      - name: ticket_id
        description: Unique Freshdesk ticket identifier.
        tests:
          - not_null
          - unique

      - name: requester_email
        description: Email address of the person who raised the ticket; used for requester resolution.
        tests:
          - not_null

      - name: status
        description: Current ticket status.
        tests:
          - not_null
          - accepted_values:
              values: ['open', 'pending', 'resolved', 'closed']

      - name: priority
        description: Freshdesk ticket priority.
        tests:
          - not_null
          - accepted_values:
              values: ['low', 'medium', 'high', 'urgent']

      - name: created_at
        description: Timestamp when the ticket was created.
        tests:
          - not_null

  - name: stg_platform_partners
    description: Cleaned partner organisation source, preserving one row per partner.
    columns:
      - name: partner_id
        description: Unique partner identifier.
        tests:
          - not_null
          - unique

      - name: partner_type
        description: Partner category.
        tests:
          - not_null
          - accepted_values:
              values: ['wealth_manager', 'fund_manager', 'family_office']

  - name: stg_platform_relationship_managers
    description: Cleaned relationship manager source, preserving one row per relationship manager.
    columns:
      - name: rm_id
        description: Unique relationship manager identifier.
        tests:
          - not_null
          - unique

      - name: partner_id
        description: Partner organisation the relationship manager belongs to.
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: email
        description: Work email address used to resolve RM-raised support tickets.
        tests:
          - not_null

  - name: stg_platform_entities
    description: Cleaned investing entity source, preserving one row per legal investing entity.
    columns:
      - name: entity_id
        description: Unique investing entity identifier.
        tests:
          - not_null
          - unique

      - name: partner_id
        description: Partner associated with the investing entity.
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: entity_type
        description: Legal structure of the investing entity.
        tests:
          - not_null
          - accepted_values:
              values: ['individual', 'corporate', 'trust', 'pension_fund']

      - name: kyc_status
        description: KYC approval status for the entity.
        tests:
          - not_null
          - accepted_values:
              values: ['approved', 'pending', 'expired', 'rejected']

  - name: stg_platform_investors
    description: Cleaned investor source, preserving one row per registered investor.
    columns:
      - name: investor_id
        description: Unique investor identifier.
        tests:
          - not_null
          - unique

      - name: user_id
        description: Platform login identifier for the investor.
        tests:
          - not_null
          - unique

      - name: email
        description: Investor registered email address used to resolve investor-raised tickets.
        tests:
          - not_null

      - name: entity_id
        description: Investing entity the investor belongs to.
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_entities')
              field: entity_id

      - name: relationship_manager_id
        description: Relationship manager responsible for the investor where applicable; may be null for self-managed investors.
        tests:
          - relationships:
              to: ref('stg_platform_relationship_managers')
              field: rm_id

  - name: stg_platform_fund_closes
    description: Cleaned fund close source, preserving one row per scheduled fund close event.
    columns:
      - name: close_id
        description: Unique fund close identifier.
        tests:
          - not_null
          - unique

      - name: fund_id
        description: Identifier for the fund; multiple closes can belong to the same fund.
        tests:
          - not_null

      - name: partner_id
        description: Partner whose investors are associated with the fund close.
        tests:
          - not_null
          - relationships:
              to: ref('stg_platform_partners')
              field: partner_id

      - name: close_number
        description: Sequential close number within the fund.
        tests:
          - not_null

      - name: scheduled_close_date
        description: Scheduled date of the fund close event.
        tests:
          - not_null

      - name: close_status
        description: Current status of the fund close.
        tests:
          - not_null
          - accepted_values:
              values: ['upcoming', 'completed', 'cancelled']

      - name: total_committed_aum
        description: Total committed AUM for the close in GBP.
        tests:
          - not_null
